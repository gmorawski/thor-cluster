apiVersion: apps/v1
kind: Deployment
metadata:
  name: mealie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mealie
  template:
    metadata:
      labels:
        app: mealie
    spec:
      containers:
        - name: mealie
          image: ghcr.io/mealie-recipes/mealie:v3.20.1
          ports:
            - containerPort: 9000
          volumeMounts:
          - mountPath: /etc/mealie/data 
            name: mealie-data-pvc 
      volumes:
        - name: mealie-data-pvc 
          persistentVolumeClaim:
            claimName: mealie-data-pvc 
