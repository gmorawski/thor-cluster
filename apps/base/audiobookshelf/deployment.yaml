apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audiobookshelf
  template:
    metadata:
      labels:
        app: audiobookshelf
    spec:
      securityContext:
        fsGroup: 33 # www-data group ID
        runAsUser: 33 # www-data user ID
        runAsGroup: 33 # www-data group ID
      containers:
        - name: audiobookshelf
          image: ghcr.io/advplyr/audiobookshelf:2.29
          ports:
            - containerPort: 13378
          envFrom:
            #            - configMapRef:
            #                name: audiobookshelf-configmap
            - secretRef:
                name: audiobookshelf-container-env
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
          - mountPath: /etc/audiobookshelf/data 
            name: audiobookshelf-data-pvc 
      volumes:
        - name: audiobookshelf-data-pvc 
          persistentVolumeClaim:
            claimName: audiobookshelf-data-pvc
