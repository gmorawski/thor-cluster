apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openwebui
  namespace: openwebui
spec:
  ingressClassName: traefik
  rules:
    - host: ai.morawski.fr
      http:
        paths:
          - backend:
              service:
                name: openwebui
                port:
                  number: 8080
            path: /
            pathType: Prefix
