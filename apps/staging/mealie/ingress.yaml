apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mealie
  namespace: mealie
spec:
  ingressClassName: traefik
  rules:
    - host: mealie.morawski.fr
      http:
        paths:
          - backend:
              service:
                name: mealie
                port:
                  number: 8080
            path: /
            pathType: Prefix
